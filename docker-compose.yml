services:
  xdu-api:
    build: .
    container_name: xdu-api
    ports:
      - "8500:8000"
    volumes:
      - xdu-data:/data
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - COOKIE_FILE=/data/cookies.json
      - XDU_USERNAME=25009290006
      - XDU_PASSWORD=${XDU_PASSWORD}
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  xdu-data:
